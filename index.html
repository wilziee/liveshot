<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📸 Foto Live Trend</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Kamera Asli disembunyikan, kita pakai Canvas untuk meniru layarnya -->
        <video id="hidden-camera" autoplay playsinline muted style="display: none;"></video>
        
        <!-- Viewfinder Utama (Yang direkam) -->
        <canvas id="viewfinder"></canvas>
        
        <!-- UI Elements -->
        <div id="ui-layer">
            <div id="status-text">Siap Merekam</div>
            
            <div class="bottom-bar">
                <button id="btn-shutter">
                    <div class="shutter-inner"></div>
                </button>
            </div>
        </div>

        <!-- Modal Hasil Video -->
        <div id="result-modal" class="hidden">
            <div class="modal-header">
                <h2>Hasil "Foto Live"</h2>
                <button id="btn-close-modal">Tutup</button>
            </div>
            <video id="result-video" autoplay loop playsinline controls></video>
            <button id="btn-download">⬇ Download Video Ini</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
